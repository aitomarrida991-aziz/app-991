<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة عزيز</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c5e4f; /* اللون الأخضر الخاص بمنصتك */
            --accent-color: #d4af37;  /* اللون الذهبي */
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-container h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* لضمان عدم خروج المدخلات عن الحاوية */
        }

        .auth-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background-color: #1e4237;
        }

        .switch-mode {
            margin-top: 15px;
            font-size: 14px;
        }

        .switch-mode a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="auth-form">
        <h2 id="form-title">تسجيل الدخول</h2>
        
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="********">
        </div>

        <div class="input-group" id="user-type-group" style="display: none;">
            <label>نوع الحساب</label>
            <select id="user-role">
                <option value="child">قسم الأطفال</option>
                <option value="adult">قسم الكبار</option>
            </select>
        </div>

        <button class="auth-btn" id="main-btn" onclick="handleAuth()">دخول</button>

        <p class="switch-mode" id="toggle-text">
            ليس لديك حساب؟ <a href="#" onclick="toggleMode()">سجل الآن</a>
        </p>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('form-title').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
        document.getElementById('main-btn').innerText = isLogin ? 'دخول' : 'إنشاء حساب';
        document.getElementById('user-type-group').style.display = isLogin ? 'none' : 'block';
        document.getElementById('toggle-text').innerHTML = isLogin ? 
            'ليس لديك حساب؟ <a href="#" onclick="toggleMode()">سجل الآن</a>' : 
            'لديك حساب بالفعل؟ <a href="#" onclick="toggleMode()">سجل دخول</a>';
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('user-role').value;

        if(isLogin) {
            console.log("محاولة تسجيل دخول:", email);
            // هنا سنربط كود Firebase لاحقاً
        } else {
            console.log("إنشاء حساب جديد:", email, "الفئة:", role);
            // هنا سنربط كود Firebase لاحقاً
        }
    }
</script>

</body>
</html>
